name: CI Level 3 With Strategy Multi Version

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Up Express
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install All Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Run Tests
        run: npm test
          
      - name: Type Check 
        run: npx tsc --noEmit